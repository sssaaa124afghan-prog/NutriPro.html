<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutriPro">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
    <title>🥗 NutriPro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --cal:#ff6b35;--pro:#60a5fa;--carb:#fbbf24;--fat:#f472b6;
            --ok:#4ade80;--no:#f87171;--pu:#a78bfa;--cy:#22d3ee;
            --bg1:#0a0a1a;--bg2:#151530;--bg3:#1e1e42;--bg4:#2a2a55;
            --tx:#eeeef5;--tx2:#8888aa;--bd:rgba(255,107,53,.1);
            --gg:linear-gradient(135deg,#ff6b35,#ff8c5a);
            --safe-b:env(safe-area-inset-bottom,0px)
        }
        body{font-family:'Cairo',sans-serif;background:var(--bg1);color:var(--tx);min-height:100dvh;overflow-x:hidden;padding-bottom:calc(70px + var(--safe-b))}

        .hdr{background:var(--bg2);padding:12px 16px 10px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--bd)}
        .hdr-top{display:flex;justify-content:space-between;align-items:center}
        .hdr h1{font-size:1.1em;font-weight:900;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hdr-sub{font-size:.68em;color:var(--tx2)}

        .bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(15,15,30,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:5px 0;padding-bottom:max(5px,var(--safe-b))}
        .bni{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 0;width:25%;cursor:pointer;font-size:.57em;color:var(--tx2);font-weight:600;border:none;background:none;font-family:'Cairo'}
        .bni .ic{font-size:1.4em;transition:.15s}.bni.act{color:var(--cal)}.bni.act .ic{transform:scale(1.1)}

        .ctn{max-width:430px;margin:0 auto;padding:10px 12px}
        .card{background:var(--bg2);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--bd)}
        .ct{font-size:.88em;font-weight:800;color:var(--cal);margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
        .ct .bdg{margin-right:auto;padding:2px 8px;border-radius:10px;font-size:.67em}

        /* ===== MACRO RINGS ===== */
        .rings-container{display:flex;justify-content:center;gap:12px;padding:10px 0;flex-wrap:wrap}
        .ring-item{text-align:center;position:relative;width:80px}
        .ring-svg{width:75px;height:75px;transform:rotate(-90deg)}
        .ring-bg{fill:none;stroke:var(--bg4);stroke-width:6}
        .ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
        .ring-cal .ring-fill{stroke:var(--cal)}
        .ring-pro .ring-fill{stroke:var(--pro)}
        .ring-carb .ring-fill{stroke:var(--carb)}
        .ring-fat .ring-fill{stroke:var(--fat)}
        .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin-top:-4px}
        .ring-val{font-size:.85em;font-weight:900;line-height:1}
        .ring-label{font-size:.55em;color:var(--tx2);margin-top:4px;font-weight:600}
        .ring-target{font-size:.5em;color:var(--tx2);margin-top:1px}

        /* ===== REMAINING BAR ===== */
        .remain-bar{background:var(--bg3);border-radius:12px;padding:10px 12px;margin-bottom:10px}
        .remain-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .remain-label{font-size:.72em;color:var(--tx2);font-weight:600}
        .remain-val{font-size:.82em;font-weight:800}
        .remain-val.ok{color:var(--ok)}.remain-val.over{color:var(--no)}
        .remain-track{height:6px;background:var(--bg1);border-radius:6px;overflow:hidden;margin-top:2px}
        .remain-fill{height:100%;border-radius:6px;transition:width .4s}
        .remain-fill.cal-fill{background:var(--cal)}.remain-fill.pro-fill{background:var(--pro)}
        .remain-fill.carb-fill{background:var(--carb)}.remain-fill.fat-fill{background:var(--fat)}
        .remain-fill.over-fill{background:var(--no)}

        /* ===== SEARCH / ADD MEAL ===== */
        .search-wrap{position:relative;margin-bottom:10px}
        .search-input{width:100%;padding:10px 14px 10px 36px;border:2px solid var(--bd);border-radius:12px;font-family:'Cairo';font-size:.88em;background:var(--bg1);color:var(--tx);outline:0;transition:.2s}
        .search-input:focus{border-color:var(--cal)}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9em}
        .search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;max-height:250px;overflow-y:auto;z-index:50;display:none;box-shadow:0 10px 30px rgba(0,0,0,.4)}
        .search-results.show{display:block}
        .sr-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:.15s;display:flex;justify-content:space-between;align-items:center}
        .sr-item:hover,.sr-item:active{background:var(--bg3)}
        .sr-item:last-child{border:none}
        .sr-name{font-weight:700;font-size:.82em}
        .sr-macros{display:flex;gap:8px;font-size:.65em;color:var(--tx2)}
        .sr-macros span{font-weight:700}
        .sr-macros .m-cal{color:var(--cal)}.sr-macros .m-pro{color:var(--pro)}.sr-macros .m-carb{color:var(--carb)}.sr-macros .m-fat{color:var(--fat)}

        .qty-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
        .qty-input{flex:1;padding:9px;border:2px solid var(--bd);border-radius:10px;background:var(--bg1);color:var(--tx);font-family:'Cairo';font-size:.88em;text-align:center;outline:0;font-weight:700}
        .qty-input:focus{border-color:var(--cal)}
        .qty-unit{font-size:.78em;color:var(--tx2);font-weight:600;min-width:35px}

        /* ===== LOGGED MEALS ===== */
        .meal-section{margin-bottom:8px}
        .meal-section-title{font-size:.75em;font-weight:700;color:var(--tx2);padding:6px 0;display:flex;align-items:center;gap:5px}
        .logged-meal{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;background:var(--bg3);border-radius:10px;margin-bottom:5px;transition:.15s}
        .logged-meal:active{transform:scale(.98)}
        .lm-info{flex:1}
        .lm-name{font-weight:700;font-size:.82em}
        .lm-detail{font-size:.65em;color:var(--tx2);margin-top:1px}
        .lm-macros{display:flex;gap:6px;font-size:.68em;font-weight:700;align-items:center}
        .lm-cal{color:var(--cal)}.lm-pro{color:var(--pro)}.lm-carb{color:var(--carb)}.lm-fat{color:var(--fat)}
        .lm-del{width:26px;height:26px;border:none;background:rgba(248,113,113,.1);color:var(--no);border-radius:7px;cursor:pointer;font-size:.8em;margin-right:6px}

        /* ===== SUGGESTION CARD ===== */
        .suggest-card{background:linear-gradient(135deg,rgba(255,107,53,.06),rgba(167,139,250,.06));border:1px solid rgba(167,139,250,.15);border-radius:14px;padding:14px;margin-bottom:10px}
        .suggest-title{font-size:.82em;font-weight:800;color:var(--pu);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .suggest-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:.15s}
        .suggest-item:active{background:rgba(255,255,255,.05)}

        /* ===== GOALS ===== */
        .goal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .goal-item{background:var(--bg3);border-radius:12px;padding:12px;text-align:center}
        .goal-item label{font-size:.68em;color:var(--tx2);font-weight:600;display:block;margin-bottom:4px}
        .goal-input{width:100%;padding:8px;border:2px solid var(--bd);border-radius:9px;background:var(--bg1);color:var(--tx);font-family:'Cairo';font-size:.95em;font-weight:700;text-align:center;outline:0}
        .goal-input:focus{border-color:var(--cal)}

        /* ===== DATABASE VIEW ===== */
        .food-item{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;background:var(--bg3);border-radius:10px;margin-bottom:5px}
        .food-item .fi-name{font-weight:700;font-size:.82em;flex:1}
        .food-item .fi-macros{display:flex;gap:6px;font-size:.65em;font-weight:700}

        /* ===== BUTTONS ===== */
        .btn{padding:7px 14px;border:none;border-radius:9px;cursor:pointer;font-family:'Cairo';font-size:.76em;font-weight:700;transition:.2s;display:inline-flex;align-items:center;gap:4px}
        .btn:active{transform:scale(.93)}
        .btn-p{background:var(--gg);color:#fff}.btn-s{background:rgba(74,222,128,.12);color:var(--ok)}
        .btn-d{background:rgba(248,113,113,.12);color:var(--no)}.btn-i{background:rgba(96,165,250,.12);color:var(--pro)}
        .btn-pu{background:rgba(167,139,250,.12);color:var(--pu)}.btn-dk{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
        .btn-sm{padding:4px 8px;font-size:.68em}.btn-full{width:100%;justify-content:center;padding:11px}
        .bg2{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}

        .fi{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
        .fi label{font-weight:600;color:var(--cal);font-size:.73em}
        .fi input,.fi select{padding:9px 11px;border:2px solid var(--bd);border-radius:10px;font-family:'Cairo';font-size:.85em;background:var(--bg1);color:var(--tx);outline:0;-webkit-appearance:none}

        .sg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:8px 0}
        .sc{background:var(--bg3);padding:12px;border-radius:12px;text-align:center}
        .sc .sn{font-size:1.3em;font-weight:900}.sc .sl{font-size:.63em;color:var(--tx2);margin-top:1px}

        .mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:300;justify-content:center;align-items:flex-end}
        .mo.act{display:flex}
        .mdl{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:82vh;overflow-y:auto;border:1px solid var(--bd);padding-bottom:var(--safe-b);animation:sUp .25s ease}
        @keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .mdl-h{width:36px;height:4px;background:var(--bg4);border-radius:4px;margin:8px auto}
        .mh{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
        .mh h2{color:var(--cal);font-size:.92em;font-weight:800}
        .mx{width:30px;height:30px;border:none;background:rgba(248,113,113,.1);color:var(--no);border-radius:7px;cursor:pointer;font-size:1em}
        .mb{padding:0 16px 16px}

        .pg{display:none}.pg.act{display:block;animation:fI .15s ease}
        @keyframes fI{from{opacity:0}to{opacity:1}}

        .tc{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:400;width:92%;max-width:400px;display:flex;flex-direction:column;gap:4px;align-items:center}
        .tst{padding:10px 16px;border-radius:14px;font-weight:700;font-family:'Cairo';font-size:.82em;text-align:center;width:100%;box-shadow:0 5px 18px rgba(0,0,0,.3);animation:tIn .25s}
        .tst-s{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
        .tst-e{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
        .tst-i{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff}
        @keyframes tIn{from{transform:translateY(-15px);opacity:0}to{transform:translateY(0);opacity:1}}

        .empty{text-align:center;padding:20px;color:var(--tx2)}.empty h3{font-size:.82em}

        .water-track{display:flex;gap:4px;justify-content:center;margin:8px 0;flex-wrap:wrap}
        .water-cup{width:32px;height:32px;border-radius:8px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8em;transition:.2s;background:var(--bg1)}
        .water-cup.filled{background:rgba(96,165,250,.15);border-color:var(--pro);color:var(--pro)}
        .water-cup:active{transform:scale(.9)}

        @media print{*{color:#000!important;background:#fff!important}.bnav,.hdr,.btn,.mo,.tc{display:none!important}body{padding:5px!important}}
        ::-webkit-scrollbar{width:0;height:0}
    </style>
</head>
<body>
<div class="tc" id="toasts"></div>

<div class="hdr">
    <div class="hdr-top">
        <div><h1>🥗 NutriPro</h1><div class="hdr-sub" id="tDate"></div></div>
        <div style="display:flex;gap:5px">
            <button class="btn btn-dk btn-sm" onclick="openGoals()">🎯</button>
            <button class="btn btn-dk btn-sm" onclick="prevDay()">◀</button>
            <button class="btn btn-dk btn-sm" onclick="nextDay()">▶</button>
        </div>
    </div>
</div>

<div class="ctn">
    <!-- HOME / DASHBOARD -->
    <div class="pg act" id="pg-home">
        <div class="card" id="ringsCard"></div>
        <div id="remainBars"></div>
        <div id="waterSection"></div>
        <div id="suggestArea"></div>
        <div class="card">
            <div class="ct">📝 وجبات اليوم <span class="bdg" style="background:rgba(255,107,53,.1);color:var(--cal)" id="mealCount">0</span></div>
            <div id="loggedMeals"></div>
        </div>
    </div>

    <!-- ADD MEAL -->
    <div class="pg" id="pg-add">
        <div class="card">
            <div class="ct">➕ إضافة وجبة</div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input class="search-input" id="foodSearch" placeholder="ابحث عن وجبة أو أكلة..." oninput="searchFood()" onfocus="searchFood()" autocomplete="off">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div id="selectedFood" style="display:none">
                <div class="logged-meal" style="margin-bottom:10px;background:var(--bg4)" id="selectedFoodInfo"></div>
                <div class="qty-row">
                    <input type="number" class="qty-input" id="qtyInput" value="100" min="1" step="1" inputmode="decimal" oninput="updateQtyPreview()">
                    <span class="qty-unit" id="qtyUnit">جرام</span>
                    <button class="btn btn-p" onclick="logMeal()">✅ أضف</button>
                </div>
                <div id="qtyPreview" style="text-align:center;font-size:.78em;color:var(--tx2);margin-top:4px"></div>
            </div>
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)">
                <div class="ct" style="border:none;padding:0;margin-bottom:8px">⚡ وجبات سريعة</div>
                <div id="quickMeals"></div>
            </div>
        </div>
    </div>

    <!-- DATABASE -->
    <div class="pg" id="pg-db">
        <div class="card">
            <div class="ct">🗄️ قاعدة البيانات <span class="bdg" style="background:rgba(96,165,250,.1);color:var(--pro)" id="dbCount">0</span></div>
            <div class="search-wrap" style="margin-bottom:8px">
                <span class="search-icon">🔍</span>
                <input class="search-input" id="dbSearch" placeholder="بحث..." oninput="renderDB()">
            </div>
            <div class="bg2" style="margin-top:0;margin-bottom:10px">
                <button class="btn btn-p" onclick="showAddFood()">➕ أكلة جديدة</button>
                <button class="btn btn-dk" onclick="expData()">📤</button>
                <button class="btn btn-dk" onclick="document.getElementById('impF').click()">📥</button>
                <input type="file" id="impF" accept=".json" onchange="impData(event)" style="display:none">
            </div>
            <div id="dbList"></div>
        </div>
    </div>

    <!-- STATS -->
    <div class="pg" id="pg-stats">
        <div class="card"><div class="ct">📈 إحصائيات</div><div class="sg" id="statsGrid"></div></div>
        <div class="card"><div class="ct">📅 آخر 7 أيام</div><div id="weekHistory"></div></div>
    </div>
</div>

<div class="bnav">
    <button class="bni act" onclick="go('home',this)"><span class="ic">🏠</span>الرئيسية</button>
    <button class="bni" onclick="go('add',this)"><span class="ic">➕</span>إضافة</button>
    <button class="bni" onclick="go('db',this)"><span class="ic">🗄️</span>الأكلات</button>
    <button class="bni" onclick="go('stats',this)"><span class="ic">📈</span>إحصائيات</button>
</div>

<!-- Modals -->
<div class="mo" id="goalMo"><div class="mdl"><div class="mdl-h"></div><div class="mh"><h2>🎯 الأهداف اليومية</h2><button class="mx" onclick="clM('goalMo')">&times;</button></div><div class="mb" id="goalMoB"></div></div></div>
<div class="mo" id="addFoodMo"><div class="mdl"><div class="mdl-h"></div><div class="mh"><h2>➕ أكلة جديدة</h2><button class="mx" onclick="clM('addFoodMo')">&times;</button></div><div class="mb" id="addFoodMoB"></div></div></div>
<div class="mo" id="editFoodMo"><div class="mdl"><div class="mdl-h"></div><div class="mh"><h2 id="editFoodMoT">✏️</h2><button class="mx" onclick="clM('editFoodMo')">&times;</button></div><div class="mb" id="editFoodMoB"></div></div></div>

<script>
const K='nutriPro_v1';
let N={goals:{cal:2500,pro:180,carb:280,fat:70},foods:{},log:{},water:{},viewDate:null};
let selectedFoodId=null;

// ===== FOOD DATABASE =====
const DEFAULT_FOODS={

f10:{name:'بياض بيض',cal:17,pro:3.6,carb:0.2,fat:0.1,unit:'حبة',per:1,cat:'بروتين'},

f12:{name:'زبادي يوناني',cal:59,pro:10,carb:3.6,fat:0.4,unit:'جرام',per:100,cat:'بروتين'},
f13:{name:'جبنة قريش',cal:98,pro:11,carb:3.4,fat:4.3,unit:'جرام',per:100,cat:'بروتين'},
// كاربوهيدرات
f14:{name:'أرز أبيض مطبوخ',cal:130,pro:2.7,carb:28,fat:0.3,unit:'جرام',per:100,cat:'كارب'},
f15:{name:'أرز بني مطبوخ',cal:123,pro:2.7,carb:26,fat:1,unit:'جرام',per:100,cat:'كارب'},
f16:{name:'مكرونة مطبوخة',cal:158,pro:5.8,carb:31,fat:0.9,unit:'جرام',per:100,cat:'كارب'},
f17:{name:'خبز أبيض (رغيف)',cal:265,pro:9,carb:49,fat:3.2,unit:'رغيف',per:1,cat:'كارب'},
f18:{name:'خبز أسمر (رغيف)',cal:247,pro:13,carb:41,fat:3.4,unit:'رغيف',per:1,cat:'كارب'},
f19:{name:'شوفان جاف',cal:389,pro:17,carb:66,fat:7,unit:'جرام',per:100,cat:'كارب'},
f20:{name:'بطاطس مسلوقة',cal:87,pro:1.9,carb:20,fat:0.1,unit:'جرام',per:100,cat:'كارب'},
f21:{name:'بطاطا حلوة',cal:86,pro:1.6,carb:20,fat:0.1,unit:'جرام',per:100,cat:'كارب'},
f22:{name:'عيش تورتيلا',cal:312,pro:8,carb:52,fat:8,unit:'حبة',per:1,cat:'كارب'},

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{loadD();rDate();renderAll()});

function loadD(){try{const s=localStorage.getItem(K);if(s){const d=JSON.parse(s);N={...N,...d}}if(!N.foods||!Object.keys(N.foods).length)N.foods={...DEFAULT_FOODS};if(!N.log)N.log={};if(!N.water)N.water={};if(!N.viewDate)N.viewDate=todayK()}catch(e){N.foods={...DEFAULT_FOODS}}}
function saveD(){localStorage.setItem(K,JSON.stringify(N))}
function todayK(){return new Date().toISOString().split('T')[0]}
function viewDate(){return N.viewDate||todayK()}

function rDate(){
    const d=new Date(viewDate()),dn=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'],
    mn=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    const isToday=viewDate()===todayK();
    document.getElementById('tDate').textContent=isToday?`اليوم - ${dn[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]}`:`${dn[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]}`;
}

function prevDay(){const d=new Date(viewDate());d.setDate(d.getDate()-1);N.viewDate=d.toISOString().split('T')[0];rDate();renderAll()}
function nextDay(){const d=new Date(viewDate());d.setDate(d.getDate()+1);if(d<=new Date()){N.viewDate=d.toISOString().split('T')[0];rDate();renderAll()}}

function go(n,b){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('act'));document.querySelectorAll('.bni').forEach(x=>x.classList.remove('act'));document.getElementById('pg-'+n).classList.add('act');if(b)b.classList.add('act');if(n==='db')renderDB();if(n==='stats')renderStats();if(n==='add')renderQuickMeals();if(n==='home')renderAll()}

// ===== GET DAY TOTALS =====
function getDayTotals(date){
    const meals=N.log[date||viewDate()]||[];
    return meals.reduce((t,m)=>({cal:t.cal+m.cal,pro:t.pro+m.pro,carb:t.carb+m.carb,fat:t.fat+m.fat}),{cal:0,pro:0,carb:0,fat:0});
}

// ===== RENDER ALL =====
function renderAll(){renderRings();renderRemain();renderWater();renderLogged();renderSuggestions()}

// ===== MACRO RINGS =====
function renderRings(){
    const t=getDayTotals(),g=N.goals;
    const items=[
        {key:'cal',label:'سعرات',val:Math.round(t.cal),target:g.cal,color:'var(--cal)',icon:'🔥'},
        {key:'pro',label:'بروتين',val:Math.round(t.pro),target:g.pro,color:'var(--pro)',icon:'💪'},
        {key:'carb',label:'كارب',val:Math.round(t.carb),target:g.carb,color:'var(--carb)',icon:'⚡'},
        {key:'fat',label:'دهون',val:Math.round(t.fat),target:g.fat,color:'var(--fat)',icon:'💧'}
    ];

    document.getElementById('ringsCard').innerHTML=`<div class="rings-container">${items.map(i=>{
        const pct=Math.min(i.target?i.val/i.target*100:0,100);
        const r=30,c=2*Math.PI*r,offset=c-(pct/100)*c;
        return`<div class="ring-item ring-${i.key}">
            <svg class="ring-svg" viewBox="0 0 75 75"><circle class="ring-bg" cx="37.5" cy="37.5" r="${r}"/><circle class="ring-fill" cx="37.5" cy="37.5" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/></svg>
            <div class="ring-center"><div class="ring-val" style="color:${i.color}">${i.val}</div></div>
            <div class="ring-label">${i.icon} ${i.label}</div>
            <div class="ring-target">هدف: ${i.target}</div>
        </div>`}).join('')}</div>`;
}

// ===== REMAINING BARS =====
function renderRemain(){
    const t=getDayTotals(),g=N.goals;
    const items=[
        {key:'cal',label:'سعرات',val:t.cal,target:g.cal,color:'cal'},
        {key:'pro',label:'بروتين',val:t.pro,target:g.pro,color:'pro'},
        {key:'carb',label:'كارب',val:t.carb,target:g.carb,color:'carb'},
        {key:'fat',label:'دهون',val:t.fat,target:g.fat,color:'fat'}
    ];
    document.getElementById('remainBars').innerHTML=`<div class="remain-bar">${items.map(i=>{
        const rem=Math.round(i.target-i.val),pct=Math.min(i.target?(i.val/i.target)*100:0,100),over=rem<0;
        return`<div style="margin-bottom:6px"><div class="remain-row"><span class="remain-label">${i.label}</span><span class="remain-val ${over?'over':'ok'}">${over?'زيادة '+Math.abs(rem):'باقي '+rem}</span></div><div class="remain-track"><div class="remain-fill ${over?'over-fill':i.color+'-fill'}" style="width:${Math.min(pct,100)}%"></div></div></div>`}).join('')}</div>`;
}

// ===== WATER =====
function renderWater(){
    const date=viewDate(),cups=N.water[date]||0;
    document.getElementById('waterSection').innerHTML=`<div class="card"><div class="ct">💧 الماء <span class="bdg" style="background:rgba(96,165,250,.1);color:var(--pro)">${cups}/8 أكواب</span></div>
    <div class="water-track">${Array.from({length:8},(_, i)=>`<div class="water-cup ${i<cups?'filled':''}" onclick="setWater(${i+1})">💧</div>`).join('')}</div></div>`;
}
function setWater(n){const date=viewDate();N.water[date]=N.water[date]===n?n-1:n;saveD();renderWater();toast(n>=8?'💧 أحسنت! شربت كفاية':'💧 '+n+'/8','s')}

// ===== LOGGED MEALS =====
function renderLogged(){
    const meals=N.log[viewDate()]||[];
    document.getElementById('mealCount').textContent=meals.length;
    if(!meals.length){document.getElementById('loggedMeals').innerHTML='<div class="empty"><h3>لم تسجل وجبات بعد</h3></div>';return}

    const sections={};
    meals.forEach((m,i)=>{const s=m.section||'أخرى';if(!sections[s])sections[s]=[];sections[s].push({...m,idx:i})});

    document.getElementById('loggedMeals').innerHTML=Object.entries(sections).map(([sec,items])=>`
        <div class="meal-section"><div class="meal-section-title">${sec==='فطور'?'🌅':sec==='غداء'?'☀️':sec==='عشاء'?'🌙':sec==='سناك'?'🍪':'📝'} ${sec}</div>
        ${items.map(m=>`<div class="logged-meal"><button class="lm-del" onclick="delMeal(${m.idx})">×</button>
            <div class="lm-info"><div class="lm-name">${m.name}</div><div class="lm-detail">${m.qty} ${m.unit}</div></div>
            <div class="lm-macros"><span class="lm-cal">${Math.round(m.cal)}</span><span class="lm-pro">${Math.round(m.pro)}p</span><span class="lm-carb">${Math.round(m.carb)}c</span><span class="lm-fat">${Math.round(m.fat)}f</span></div>
        </div>`).join('')}</div>`).join('');
}

function delMeal(idx){const date=viewDate();if(N.log[date]){N.log[date].splice(idx,1);saveD();renderAll();toast('🗑️ تم الحذف','e')}}

// ===== SUGGESTIONS =====
function renderSuggestions(){
    const t=getDayTotals(),g=N.goals;
    const remPro=g.pro-t.pro,remCal=g.cal-t.cal;
    if(remPro<=0&&remCal<=0){document.getElementById('suggestArea').innerHTML='';return}

    const suggestions=Object.entries(N.foods).filter(([id,f])=>f.pro>=10).sort((a,b)=>b[1].pro/b[1].cal-a[1].pro/a[1].cal).slice(0,4);

    if(!suggestions.length){document.getElementById('suggestArea').innerHTML='';return}
    document.getElementById('suggestArea').innerHTML=`<div class="suggest-card"><div class="suggest-title">💡 اقتراحات لتكملة الهدف</div>
        <div style="font-size:.72em;color:var(--tx2);margin-bottom:8px">محتاج ~${Math.max(0,Math.round(remPro))}g بروتين و ~${Math.max(0,Math.round(remCal))} سعرة</div>
        ${suggestions.map(([id,f])=>`<div class="suggest-item" onclick="quickSelect('${id}')"><div><div style="font-weight:700;font-size:.82em">${f.name}</div><div style="font-size:.62em;color:var(--tx2)">${f.per} ${f.unit}</div></div>
        <div class="sr-macros"><span class="m-cal">${f.cal}</span><span class="m-pro">${f.pro}p</span></div></div>`).join('')}</div>`;
}

// ===== SEARCH FOOD =====
function searchFood(){
    const q=document.getElementById('foodSearch').value.trim().toLowerCase();
    const res=document.getElementById('searchResults');
    if(!q){res.classList.remove('show');return}

    const results=Object.entries(N.foods).filter(([id,f])=>f.name.toLowerCase().includes(q)).slice(0,15);
    if(!results.length){res.innerHTML='<div style="padding:12px;text-align:center;color:var(--tx2);font-size:.82em">لم يتم العثور على نتائج</div>';res.classList.add('show');return}

    res.innerHTML=results.map(([id,f])=>`<div class="sr-item" onclick="selectFood('${id}')"><div class="sr-name">${f.name}</div>
        <div class="sr-macros"><span class="m-cal">${f.cal}cal</span><span class="m-pro">${f.pro}p</span><span class="m-carb">${f.carb}c</span><span class="m-fat">${f.fat}f</span></div></div>`).join('');
    res.classList.add('show');
}

function selectFood(id){
    selectedFoodId=id;const f=N.foods[id];
    document.getElementById('searchResults').classList.remove('show');
    document.getElementById('foodSearch').value=f.name;
    document.getElementById('qtyUnit').textContent=f.unit;
    document.getElementById('qtyInput').value=f.per;
    document.getElementById('selectedFood').style.display='block';
    document.getElementById('selectedFoodInfo').innerHTML=`<div class="lm-info"><div class="lm-name">${f.name}</div><div class="lm-detail">لكل ${f.per} ${f.unit}</div></div>
        <div class="lm-macros"><span class="lm-cal">${f.cal}</span><span class="lm-pro">${f.pro}p</span><span class="lm-carb">${f.carb}c</span><span class="lm-fat">${f.fat}f</span></div>`;
    updateQtyPreview();
}

function quickSelect(id){go('add',document.querySelectorAll('.bni')[1]);setTimeout(()=>selectFood(id),100)}

function updateQtyPreview(){
    if(!selectedFoodId)return;const f=N.foods[selectedFoodId];const qty=parseFloat(document.getElementById('qtyInput').value)||0;
    const mult=f.unit==='جرام'||f.unit==='مل'?qty/100:qty;
    const cal=Math.round(f.cal*mult),pro=Math.round(f.pro*mult*10)/10,carb=Math.round(f.carb*mult*10)/10,fat=Math.round(f.fat*mult*10)/10;
    document.getElementById('qtyPreview').innerHTML=`<span style="color:var(--cal)">${cal} سعرة</span> | <span style="color:var(--pro)">${pro}g بروتين</span> | <span style="color:var(--carb)">${carb}g كارب</span> | <span style="color:var(--fat)">${fat}g دهون</span>`;
}

function logMeal(){
    if(!selectedFoodId)return toast('اختر أكلة','e');
    const f=N.foods[selectedFoodId],qty=parseFloat(document.getElementById('qtyInput').value)||0;
    if(!qty)return toast('أدخل الكمية','e');
    const mult=f.unit==='جرام'||f.unit==='مل'?qty/100:qty;
    const hour=new Date().getHours();
    const section=hour<11?'فطور':hour<16?'غداء':hour<20?'عشاء':'سناك';

    const date=viewDate();if(!N.log[date])N.log[date]=[];
    N.log[date].push({name:f.name,qty,unit:f.unit,cal:f.cal*mult,pro:f.pro*mult,carb:f.carb*mult,fat:f.fat*mult,section,time:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})});

    saveD();selectedFoodId=null;
    document.getElementById('selectedFood').style.display='none';
    document.getElementById('foodSearch').value='';
    toast('✅ تم إضافة '+f.name,'s');
    go('home',document.querySelectorAll('.bni')[0]);
}

// Quick meals
function renderQuickMeals(){
    const recent=[];const dates=Object.keys(N.log).sort().reverse().slice(0,5);
    const seen=new Set();
    dates.forEach(d=>(N.log[d]||[]).forEach(m=>{if(!seen.has(m.name)&&recent.length<6){seen.add(m.name);const fid=Object.entries(N.foods).find(([id,f])=>f.name===m.name);if(fid)recent.push(fid)}}));
    document.getElementById('quickMeals').innerHTML=recent.length?recent.map(([id,f])=>`<div class="suggest-item" onclick="selectFood('${id}')"><div><div style="font-weight:700;font-size:.82em">${f.name}</div></div><div class="sr-macros"><span class="m-cal">${f.cal}</span><span class="m-pro">${f.pro}p</span></div></div>`).join(''):'<div class="empty"><h3>ابدأ بتسجيل وجبات وهتظهر هنا</h3></div>';
}

// ===== STATS =====
function renderStats(){
    const today=todayK(),t=getDayTotals(today);
    const days7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().split('T')[0])}
    const avg={cal:0,pro:0,carb:0,fat:0};let cnt=0;
    days7.forEach(d=>{const t=getDayTotals(d);if(t.cal>0){avg.cal+=t.cal;avg.pro+=t.pro;avg.carb+=t.carb;avg.fat+=t.fat;cnt++}});
    if(cnt){avg.cal=Math.round(avg.cal/cnt);avg.pro=Math.round(avg.pro/cnt);avg.carb=Math.round(avg.carb/cnt);avg.fat=Math.round(avg.fat/cnt)}

    document.getElementById('statsGrid').innerHTML=`
        <div class="sc" style="--c:var(--cal)"><div class="sn" style="color:var(--cal)">${avg.cal}</div><div class="sl">متوسط السعرات</div></div>
        <div class="sc"><div class="sn" style="color:var(--pro)">${avg.pro}g</div><div class="sl">متوسط البروتين</div></div>
        <div class="sc"><div class="sn" style="color:var(--carb)">${avg.carb}g</div><div class="sl">متوسط الكارب</div></div>
        <div class="sc"><div class="sn" style="color:var(--fat)">${avg.fat}g</div><div class="sl">متوسط الدهون</div></div>`;

    document.getElementById('weekHistory').innerHTML=days7.map(d=>{
        const t=getDayTotals(d),isToday=d===today;
        const dn=new Date(d);const dayName=['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'][dn.getDay()];
        const pct=N.goals.cal?Math.min(Math.round(t.cal/N.goals.cal*100),100):0;
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;${isToday?'font-weight:800':''}">
            <span style="min-width:40px;font-size:.72em;color:${isToday?'var(--cal)':'var(--tx2)'}">${dayName}</span>
            <div style="flex:1;height:6px;background:var(--bg4);border-radius:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct>=100?'var(--ok)':'var(--cal)'};border-radius:6px"></div></div>
            <span style="min-width:45px;text-align:left;font-size:.72em;color:var(--tx2)">${Math.round(t.cal)}</span></div>`}).join('');
}

// ===== EXPORT / IMPORT =====
function expData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(N,null,2)],{type:'application/json'}));a.download=`NutriPro_${todayK()}.json`;a.click();toast('📤','s')}
function impData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.foods&&confirm('استبدال؟')){N={...N,...d};saveD();location.reload()}}catch{toast('خطأ','e')}};r.readAsText(f)}

function clM(id){document.getElementById(id).classList.remove('act')}
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('act')}));
function toast(m,t='s'){const c=document.getElementById('toasts'),e=document.createElement('div');e.className='tst tst-'+t;e.textContent=m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='.2s';setTimeout(()=>e.remove(),200)},2500)}
</script>
</body>
